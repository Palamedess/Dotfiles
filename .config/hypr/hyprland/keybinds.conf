bind = $mainMod, RETURN, exec, uwsm-app -- $terminal
bind = $mainMod SHIFT, S, movetoworkspace, special
bind = $mainMod, C, killactive

bind = $mainMod, Delete, exec, uwsm stop

bind = $mainMod, Z, fullscreen, 1
bind = $mainMod, F, fullscreen, 3
bind = $mainMod SHIFT, F, togglefloating

bind = $mainMod, R, exec, uwsm-app -- $menu
bind = $mainMod, E, exec, uwsm-app -- $fileManager
bind = $mainMod, B, exec, pkill -x -SIGUSR1 waybar || uwsm-app -- waybar
bind = $mainMod SHIFT, B, exec, pkill -x -SIGUSR2 waybar || uwsm-app -- waybar

bind = $mainMod, T, togglesplit# dwindle


# Run script to toggle mouse locking
bind = , F1, exec, $SCRIPTDIR/mouselock.sh

# Application launcher shortcut
bind = , XF86LaunchB, exec, uwsm-app -- $menu

# Move focus with vim binds
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

# Resizing
binde = $mainMod, right, resizeactive, 20 0
binde = $mainMod, left, resizeactive, -20 0
binde = $mainMod, up, resizeactive, 0 -20
binde = $mainMod, down, resizeactive, 0 20

binde = $mainMod SHIFT, l, resizeactive, 20 0
binde = $mainMod SHIFT, h, resizeactive, -20 0
binde = $mainMod SHIFT, j, resizeactive, 0 -20
binde = $mainMod SHIFT, k, resizeactive, 0 20

# Switching windows
bind = $mainMod CTRL, h, movewindow, l
bind = $mainMod CTRL, l, movewindow, r
bind = $mainMod CTRL, k, movewindow, u
bind = $mainMod CTRL, j, movewindow, d

# Mouse resizing
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow

# Switch workspaces with mainMod + [0-8]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9

# The same but silently
bind = $mainMod ALT, 1, movetoworkspacesilent, 1
bind = $mainMod ALT, 2, movetoworkspacesilent, 2
bind = $mainMod ALT, 3, movetoworkspacesilent, 3
bind = $mainMod ALT, 4, movetoworkspacesilent, 4
bind = $mainMod ALT, 5, movetoworkspacesilent, 5
bind = $mainMod ALT, 6, movetoworkspacesilent, 6
bind = $mainMod ALT, 7, movetoworkspacesilent, 7
bind = $mainMod ALT, 8, movetoworkspacesilent, 8
bind = $mainMod ALT, 9, movetoworkspacesilent, 9


# Special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace
bind = $mainMod SHIFT, S, movetoworkspace

# Laptop keybindings
bindel = , XF86MonBrightnessUp, exec, uwsm-app -- swayosd-client --monitor "$(hyprctl monitors -j | jq -r '.[] | select(.focused == true).name')" --brightness +3 --device 'intel_backlight'
bindel = , XF86MonBrightnessDown, exec, uwsm-app -- swayosd-client --monitor "$(hyprctl monitors -j | jq -r '.[] | select(.focused == true).name')" --brightness -3 --device 'intel_backlight'

bindel = , XF86KbdBrightnessUp, exec, uwsm-app -- swayosd-client --monitor "$(hyprctl monitors -j | jq -r '.[] | select(.focused == true).name')" --brightness +3 --device 'smc::kbd_backlight'
bindel = , XF86KbdBrightnessDown, exec, uwsm-app -- swayosd-client --monitor "$(hyprctl monitors -j | jq -r '.[] | select(.focused == true).name')" --brightness -3 --device 'smc::kbd_backlight'

bindel = , XF86AudioRaiseVolume, exec, uwsm-app -- swayosd-client --monitor "$(hyprctl monitors -j | jq -r '.[] | select(.focused == true).name')" --output-volume raise
bindel = , XF86AudioLowerVolume, exec, uwsm-app -- swayosd-client --monitor "$(hyprctl monitors -j | jq -r '.[] | select(.focused == true).name')" --output-volume lower

bindl = , XF86AudioMute, exec, uwsm-app -- swayosd-client --monitor "$(hyprctl monitors -j | jq -r '.[] | select(.focused == true).name')" --output-volume mute-toggle

#bindel = $mainMod, F3, exec, uwsm-app -- swayosd-client --brightness +3 --device 'input9::kana'
#bindel = $mainMod, F4, exec, uwsm-app -- swayosd-client --brightness -3 --device 'input9::kana'

bindl = $mainMod, F10, exec, uwsm-app -- swayosd-client --monitor "$(hyprctl monitors -j | jq -r '.[] | select(.focused == true).name')" --output-volume mute-toggle
bindel = $mainMod, F11, exec, uwsm-app -- swayosd-client --monitor "$(hyprctl monitors -j | jq -r '.[] | select(.focused == true).name')" --output-volume lower
bindel = $mainMod, F12, exec, uwsm-app -- swayosd-client --monitor "$(hyprctl monitors -j | jq -r '.[] | select(.focused == true).name')" --output-volume raise

bindel = , XF86AudioNext, exec, swayosd-client --monitor "$(hyprctl monitors -j | jq -r '.[] | select(.focused == true).name')" --playerctl next
bindel = , XF86AudioPrev, exec, swayosd-client --monitor "$(hyprctl monitors -j | jq -r '.[] | select(.focused == true).name')" --playerctl previous
