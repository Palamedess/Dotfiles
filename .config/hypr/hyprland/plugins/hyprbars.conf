exec = hyprctl dismissnotify

plugin {
  hyprbars {
    enabled = true

    bar_height = 26
    bar_color = $bgAlt
    bar_blur = true

    bar_title_enabled = true
    bar_text_size = 11
    bar_text_align = left
    bar_text_font = Inter
    col.text = $fg

    bar_part_of_window = false
    bar_precedence_over_border = true

    bar_button_padding = 5
    bar_padding = 10

    # example buttons (R -> L)
    # hyprbars-button = color, size, on-click
    hyprbars-button = rgba(00000000), 24, 󰖭, hyprctl dispatch killactive, rgb($fgAlpha)
    hyprbars-button = rgba(00000000), 24, 󰊓, hyprctl dispatch fullscreen 1, rgb($fgAlpha)
    #hyprbars-button = rgb($diag_yellowAlpha), 16, , ../scripts/hide-active.sh

    # cmd to run on double click of the bar
    on_double_click = hyprctl dispatch fullscreen 0
  }
}

windowrule = match:float true, hyprbars:no_bar false
windowrule = match:float false, hyprbars:no_bar true
widnowrule =  match float true, match:fullscreen true, hyprbars:no_bar false
