source=./colors/moon.conf
source=./blur.conf

general {
  gaps_in = 4
  gaps_out = 8
  gaps_workspaces = 25

  border_size = 1
  col.inactive_border = rgba($bgAltAlphaFF)
  col.active_border = rgba($borderAlphaFF)
}

decoration {
  rounding_power = 2.4
  rounding = 6
  active_opacity = 0.90
  inactive_opacity = 0.90
  fullscreen_opacity = 0.90
  border_part_of_window = true

  shadow {
    enabled = false
    color = rgba($lineAlphaF0)
    range = 20
    offset = 0 0
    render_power = 10
    ignore_window = true

  }

  dim_inactive = true
  dim_strength = 0.05
  dim_special = 0.07
}

