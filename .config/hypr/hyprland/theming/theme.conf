source=./moon-colors.conf
source=./borders-plus-plus.conf

general {
  gaps_in = 4
  gaps_out = 8
  gaps_workspaces = 25

  border_size = 1
  col.inactive_border = rgba($bgAltAlphaFF)
  col.active_border = rgba($borderAlphaFF)
}

decoration {
  rounding_power = 2.4
  rounding = 6
  active_opacity = 0.90
  inactive_opacity = 0.90
  fullscreen_opacity = 0.90
  border_part_of_window = true

  blur {
    enabled = true
    size = 12
    passes = 3
    contrast = 2
    brightness = 0.5
    noise = 0.025
    ignore_opacity = true
    new_optimizations = true
    popups = true
    popups_ignorealpha = 0.9
    xray = true
  }

  shadow {
    color = rgba($lineAlpha60)
    enabled = false
    range = 40
    offset = 2 2
    render_power = 10
    ignore_window = true

  }

  dim_inactive = true
  dim_strength = 0.05
  dim_special = 0.07
}

