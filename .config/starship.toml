"$schema" = 'https://starship.rs/config-schema.json'

format = """
 $username\
$hostname\
$directory\
$character"""

right_format = """
$git_branch\
$git_state\
$git_status\
$cmd_duration"""

add_newline = false

[directory]
truncation_length = 2
use_os_path_sep = true
style = "blue"
read_only = " ůįĆĺ"
format = "[$path]($style)[$lock_symbol]($lock_style) "

[character]
success_symbol = "[ůįäć](blue)"
error_symbol = "[ůįäć](red)"
vimcmd_symbol = "[ůįúĪ](green)"

[git_branch]
format = "[$symbol$branch]($style)"
symbol = "Ôźė "
style = "white"

[git_commit]
commit_hash_length = 8
tag_symbol = "ůįďĻ "
disabled = false
style = "bright-white"

[git_status]
format = "[[(*$conflicted$untracked$modified$staged$renamed$deleted)](bright-red) ($ahead_behind$stashed)]($style)"
style = "cyan"
conflicted = "‚Äč"
untracked = "‚Äč"
modified = "‚Äč"
staged = "‚Äč"
renamed = "‚Äč"
deleted = "‚Äč"
stashed = "‚Č°"
ahead = '[‚á°${count}](bold green)'
behind = '[‚á£${count}](bold red)'
diverged = '[ÔĎŅ ](bold red)([‚á°${ahead_count} ](bold green)[‚á£${behind_count}](bold red))'

[git_state]
format = '[\($state( $progress_current of $progress_total)\)]($style) '
style = "bright-white"

[cmd_duration]
format = "[$duration]($style) "
style = "bright-white"

[c]
format = '(via [$symbol($version(-$name) )]($style))'
[cpp]
format = '(via [$symbol($version(-$name) )]($style))'
[lua]
format = '(via [$symbol($version )]($style))'
[package]
format = '(is [$symbol$version]($style) )'
[rust]
format = '(via [$symbol($version )]($style))'
